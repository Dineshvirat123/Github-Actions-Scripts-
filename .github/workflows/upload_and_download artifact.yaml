name: Upload and Download artifacts

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: upload the file
        run: echo "data" > data.txt

      - name: upload the file into artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datafile
          path: data.txt

  download:
    runs-on: ubuntu-latest
    needs: upload

    steps:
      - name: download the file from artifact
        uses: actions/download-artifact@v4
        with:
          name: datafile

      - name: display the content inside the artifact
        run: cat data.txt

      - name: Check extracted path
        run: |
          pwd
          ls -R
          realpath data.txt
